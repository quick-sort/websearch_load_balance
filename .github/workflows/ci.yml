name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RUST_VERSION: "1.85"
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          version: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: websearch

      - name: Check format
        run: cargo fmt --check --all

      - name: Run clippy
        run: cargo clippy --all -- -D warnings

      - name: Build
        run: cargo build --all --verbose

      - name: Run unit tests
        run: cargo test --all --verbose

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Check if any API keys are configured (KEYS variable must be non-empty JSON array)
    if: vars.TAVILY_API_KEYS != '' || vars.GLM_API_KEYS != '' || vars.MINIMAX_API_KEYS != '' || vars.GLM_CODING_API_KEYS != '' || vars.BOCHA_API_KEYS != '' || vars.FIRECRAWL_API_KEYS != '' || vars.SERPAPI_API_KEYS != '' || vars.SERPER_API_KEYS != '' || vars.ANYCRAWL_API_KEYS != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          version: ${{ env.RUST_VERSION }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: websearch

      - name: Set environment variables from secrets (array format)
        env:
          TAVILY_API_KEYS: ${{ vars.TAVILY_API_KEYS }}
          GLM_API_KEYS: ${{ vars.GLM_API_KEYS }}
          GLM_CODING_API_KEYS: ${{ vars.GLM_CODING_API_KEYS }}
          MINIMAX_API_KEYS: ${{ vars.MINIMAX_API_KEYS }}
          BOCHA_API_KEYS: ${{ vars.BOCHA_API_KEYS }}
          SERPAPI_API_KEYS: ${{ vars.SERPAPI_API_KEYS }}
          SERPER_API_KEYS: ${{ vars.SERPER_API_KEYS }}
          FIRECRAWL_API_KEYS: ${{ vars.FIRECRAWL_API_KEYS }}
          ANYCRAWL_API_KEYS: ${{ vars.ANYCRAWL_API_KEYS }}
        run: |
          # Parse JSON array and extract first key
          parse_key() {
            local var_name="$1"
            local secrets_var="${var_name}S"
            local value="${!secrets_var}"
            if [ -n "$value" ] && [ "$value" != "[]" ]; then
              # Extract first element from JSON array: ["key1","key2"] -> "key1"
              key=$(echo "$value" | python3 -c "import sys,json; keys=json.load(sys.stdin); print(keys[0] if keys else '')" 2>/dev/null)
              if [ -n "$key" ]; then
                echo "${var_name}=$key" >> $GITHUB_ENV
                echo "Set ${var_name} from ${secrets_var}"
              fi
            fi
          }

          parse_key "TAVILY_API_KEY"
          parse_key "GLM_API_KEY"
          parse_key "GLM_CODING_API_KEY"
          parse_key "MINIMAX_API_KEY"
          parse_key "BOCHA_API_KEY"
          parse_key "SERPAPI_API_KEY"
          parse_key "SERPER_API_KEY"
          parse_key "FIRECRAWL_API_KEY"
          parse_key "ANYCRAWL_API_KEY"

      - name: Build
        run: cargo build --all

      - name: Run integration tests
        run: cargo test --all --ignored

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          version: ${{ env.RUST_VERSION }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: websearch

      - name: Build release
        run: cargo build --release --locked --no-default-features

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: websearch_binary
          path: target/release/one_search
          retention-days: 7
