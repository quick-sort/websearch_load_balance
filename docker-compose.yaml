services:
  websearch:
    build:
      context: .
      dockerfile: Dockerfile
    image: one_search:latest
    container_name: one-search-mcp
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - RUST_LOG=info
      - CONFIG_PATH=/app/config.yaml
