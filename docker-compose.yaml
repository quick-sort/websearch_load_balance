services:
  websearch:
    build:
      context: .
      dockerfile: Dockerfile
    image: one_search:latest
    container_name: one-search-mcp
    restart: unless-stopped
    stdin_open: true
    tty: true
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - RUST_LOG=info
      - CONFIG_PATH=/app/config.yaml